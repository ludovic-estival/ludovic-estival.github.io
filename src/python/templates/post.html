<!DOCTYPE html>
<html>

<head id="head">
    <title>{{ title }} | Blog metal</title>
    <link rel='stylesheet' type='text/css' href='../../../src/css/general.css'>
    <link rel='stylesheet' type='text/css' href='../../../src/css/post.css'>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="row" id="body"></div>

    <!-- Box -->
    <div class="row mb-5">
        <div class="col-sm-3"></div>
        <div class="col-sm-6">
            <div class="home-box">
                <h2>{{ title }}</h2>
                <p>{{ date }}</p>
                <div class="categories mt-2">
                    {% for c in categories %}
                        <span class="badge bg-success">{{ c }}</span>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="col-sm-3"></div>
    </div>

    <!-- Post content -->
    <div class="row">
        <div class="col-sm-3"></div>
        <div class="col-sm-6">
            <p>Introduction</p>
            <p class="section-title">Section 1</p>
        </div>
        <div class="col-sm-3"></div>
    </div>

     <!-- Footer -->
     <div class="row" id="footer">
        <div class="col-sm-3"></div>
        <div class="col-sm-8 footer">
            <p>Un blog sur le metal par Ludovic Estival</p>
            <a href="../../../index.html">- Accueil</a>
            <a>- Posts</a>
            <a>- Catégories</a>
            <a>- A propos</a>
            <a href="https://github.com/ludovic-estival"><i class="fa-brands fa-github"></i></a>
            <a href="https://www.linkedin.com/in/ludovic-estival-a7bb5224b/"><i class="fa-brands fa-linkedin"></i></a>
        </div>
        <div class="col-sm-2"></div>
    </div>
</body>
<script src="../../../src/js/general.js"></script>
</html>
